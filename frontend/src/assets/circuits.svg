<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
  <defs>
    <pattern id="circuitPattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="50" cy="50" r="3" fill="#5B8CFF" opacity="0.3"/>
      <line x1="50" y1="50" x2="50" y2="0" stroke="#5B8CFF" stroke-width="1" opacity="0.2"/>
      <line x1="50" y1="50" x2="100" y2="50" stroke="#5B8CFF" stroke-width="1" opacity="0.2"/>
      <line x1="50" y1="50" x2="50" y2="100" stroke="#5B8CFF" stroke-width="1" opacity="0.2"/>
      <line x1="50" y1="50" x2="0" y2="50" stroke="#5B8CFF" stroke-width="1" opacity="0.2"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#circuitPattern)"/>
</svg>
